name: Deploy Vite Site to Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # قمنا بإزالة cache: 'npm' لمنع النظام من جلب الملفات القديمة التالفة

      - name: Fresh Install
        # استخدام npm ci بدلاً من install لأنه مخصص لبيئات العمل الآلية ويضمن تطابق النسخ
        run: |
          npm install -g npm@latest
          npm ci || npm install --force

      - name: Build
        # التأكد من تمرير CI=false لتجاوز تحذيرات الـ CSS في index.css
        run: CI=false npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4